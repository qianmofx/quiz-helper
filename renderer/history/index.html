<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;
  --surface:#f8f9fa;
  --border:#e8eaed;
  --text-primary:#1a1a2e;
  --text-secondary:#5f6368;
  --text-tertiary:#9aa0a6;
  --accent:#f97316;
  --accent-light:rgba(249,115,22,0.08);
  --radius:8px;
  --radius-sm:6px;
  --font:'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif;
  --shadow:0 8px 32px rgba(0,0,0,0.12);
}
body{
  font-family:var(--font);
  background:#f5f6f7;color:var(--text-primary);
  height:100vh;display:flex;flex-direction:column;
  border:1px solid var(--border);border-radius:12px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.12);
}
.titlebar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--bg);
  border-bottom:1px solid var(--border);flex-shrink:0;
  -webkit-app-region:drag;
}
.titlebar-title{font-size:15px;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em}
.search-input{
  flex:1;background:var(--surface);border:1.5px solid transparent;
  border-radius:8px;padding:8px 14px;
  color:var(--text-primary);font-family:var(--font);
  font-size:14px;outline:none;-webkit-app-region:no-drag;
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.search-input:focus{border-color:var(--accent);background:var(--bg);box-shadow:0 0 0 3px rgba(249,115,22,0.08)}
.search-input::placeholder{color:var(--text-tertiary)}
.close-btn{
  width:28px;height:28px;border-radius:7px;border:none;
  background:transparent;color:var(--text-tertiary);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-app-region:no-drag;transition:all .15s;
}
.close-btn:hover{background:#fce8e6;color:#d93025}

.main-area{display:flex;flex:1;overflow:hidden}
.list{flex:1;overflow-y:auto;padding:8px}
.list::-webkit-scrollbar{width:5px}
.list::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}

.item{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;
  cursor:pointer;transition:all .18s;
}
.item:hover{border-color:#d0d2d6;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.item.active{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 1px var(--accent)}

.item-q{
  font-size:14px;font-weight:600;color:var(--text-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;
}
.item-a-preview{
  font-size:13px;color:var(--text-tertiary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;
}
.item-meta{font-size:12px;color:var(--text-tertiary);font-family:'SF Mono','Consolas',monospace;font-feature-settings:"tnum"}

.detail-panel{
  width:360px;border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  background:var(--bg);
}
.detail-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text-tertiary);flex-shrink:0;
  font-family:'SF Mono','Consolas',monospace;font-feature-settings:"tnum";
  background:var(--surface);
}
.detail-content{
  flex:1;overflow-y:auto;padding:18px;
  font-size:14px;line-height:1.85;color:var(--text-secondary);
  white-space:pre-wrap;word-break:break-word;
}
.detail-content::-webkit-scrollbar{width:5px}
.detail-content::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.detail-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--text-tertiary);font-size:14px;
}

.empty{text-align:center;color:var(--text-tertiary);padding:60px 0;font-size:14px}

.footer{
  padding:10px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--text-tertiary);flex-shrink:0;
  background:var(--surface);
}
.clear-btn{
  font-size:12px;height:30px;padding:0 14px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;color:var(--text-tertiary);cursor:pointer;
  font-family:var(--font);transition:all .15s;
}
.clear-btn:hover{border-color:rgba(217,48,37,.3);color:#d93025;background:#fef7f6}
</style>
</head>
<body>
<div class="titlebar">
  <span class="titlebar-title">历史记录</span>
  <input class="search-input" id="search" placeholder="搜索题目或答案…">
  <button class="close-btn" onclick="window.close()">✕</button>
</div>

<div class="main-area">
  <div class="list" id="list"></div>
  <div class="detail-panel">
    <div class="detail-head" id="detailHead">点击左侧记录查看详情</div>
    <div class="detail-content" id="detailContent">
      <div class="detail-empty">选择一条记录查看完整内容</div>
    </div>
  </div>
</div>

<div class="footer">
  <span id="countLabel">加载中…</span>
  <button class="clear-btn" onclick="clearAll()">清空全部</button>
</div>

<script>
let records=[],activeId=null

async function load(kw=''){
  records=await window.api.getHistory(kw);renderList()
}
function renderList(){
  const list=document.getElementById('list')
  document.getElementById('countLabel').textContent=`共 ${records.length} 条记录`
  if(!records.length){list.innerHTML='<div class="empty">暂无记录</div>';return}
  list.innerHTML=records.map(r=>`
    <div class="item ${r.id===activeId?'active':''}" onclick="selectRecord(${r.id})">
      <div class="item-q">${escHtml(r.question)}</div>
      <div class="item-a-preview">${escHtml(r.answer.substring(0,80))}</div>
      <div class="item-meta">${r.time}</div>
    </div>
  `).join('')
}
function selectRecord(id){
  activeId=id
  const r=records.find(x=>x.id===id);if(!r)return
  document.getElementById('detailHead').textContent=r.time
  document.getElementById('detailContent').innerHTML=
    `<div style="margin-bottom:12px;font-weight:600;color:var(--text-primary)">题目</div><div style="margin-bottom:20px">${escHtml(r.question)}</div><div style="margin-bottom:12px;font-weight:600;color:var(--text-primary)">解答</div><div>${escHtml(r.answer)}</div>`
  renderList()
}
async function clearAll(){
  if(!confirm('确定清空全部历史记录？'))return
  await window.api.clearHistory()
  activeId=null
  document.getElementById('detailHead').textContent='点击左侧记录查看详情'
  document.getElementById('detailContent').innerHTML='<div class="detail-empty">选择一条记录查看完整内容</div>'
  await load()
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

let debounce
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(debounce);debounce=setTimeout(()=>load(e.target.value),200)
})
document.addEventListener('keydown',e=>{if(e.key==='Escape')window.close()})
load()
</script>
</body>
</html>
