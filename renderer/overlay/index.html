<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  cursor: crosshair;
  background: transparent;
  user-select: none;
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
}
canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
#hint {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(26,26,46,0.82);
  color: #fff;
  font-size: 14px;
  padding: 10px 24px;
  border-radius: 10px;
  pointer-events: none;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  letter-spacing: 0.3px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 8px;
}
#hint kbd {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
}
#size-label {
  position: fixed;
  background: rgba(26,26,46,0.85);
  color: #fbbf24;
  font-family: 'SF Mono', 'Consolas', monospace;
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 6px;
  pointer-events: none;
  display: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hint">
  ← 拖拽选择题目区域
  <kbd>Esc</kbd> 取消
</div>
<div id="size-label"></div>

<script>
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const sizeLabel = document.getElementById('size-label')

let startX = 0, startY = 0, isDrawing = false, hasDrawn = false

function resize() {
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
  drawMask()
}

function drawMask(rx, ry, rw, rh) {
  ctx.clearRect(0, 0, canvas.width, canvas.height)

  // Semi-transparent overlay
  ctx.fillStyle = 'rgba(26, 26, 46, 0.5)'
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  if (rw && rh) {
    // Clear selection area — 完全透明，不加任何线条
    ctx.clearRect(rx, ry, rw, rh)
  }
}

window.addEventListener('resize', resize)
resize()

canvas.addEventListener('mousedown', e => {
  startX = e.clientX; startY = e.clientY; isDrawing = true; hasDrawn = false
})

canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return
  hasDrawn = true
  const x = Math.min(startX, e.clientX)
  const y = Math.min(startY, e.clientY)
  const w = Math.abs(e.clientX - startX)
  const h = Math.abs(e.clientY - startY)
  drawMask(x, y, w, h)

  sizeLabel.style.display = 'block'
  sizeLabel.style.left = Math.min(e.clientX + 14, window.innerWidth - 100) + 'px'
  sizeLabel.style.top = Math.min(e.clientY + 14, window.innerHeight - 50) + 'px'
  sizeLabel.textContent = `${w} × ${h}`
})

canvas.addEventListener('mouseup', e => {
  if (!isDrawing) return
  isDrawing = false
  sizeLabel.style.display = 'none'

  const x = Math.min(startX, e.clientX)
  const y = Math.min(startY, e.clientY)
  const w = Math.abs(e.clientX - startX)
  const h = Math.abs(e.clientY - startY)

  if (w < 10 || h < 10) {
    window.api.cancelScreenshot()
    return
  }
  window.api.submitRegion({ x, y, width: w, height: h })
})

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') window.api.cancelScreenshot()
})
</script>
</body>
</html>
